<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Listesi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="scripts/script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous" defer></script>
</head>
<body>
  <div class="d-flex todo-wrapper">

    <!-- left Panel -->
    <div class="panel-add d-flex flex-column justify-content-center p-4">
      <p class="panel-label mb-4">Yeni görev</p>
      <div class="card-body p-0 d-flex flex-column gap-3">
        <input id="input-one" type="text" class="form-control" placeholder="Todo giriniz">
        <button id="add-btn" type="button" class="btn btn-ekle w-100 py-2">Ekle</button>
      </div>
    </div>

    <!-- right Panel -->
    <div class="panel-list d-flex flex-column flex-grow-1">

      <div class="panel-header p-4 pb-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h1 class="mb-0">Todo Listesi</h1>
          <button id="theme-btn" type="button" class="btn btn-theme">
            <i class="fa fa-sun-o"></i>
          </button>
        </div>
        <div class="search-wrap">
          <i class="fa fa-search search-icon"></i>
          <input id="search-input" type="text" class="form-control" placeholder="Todo arayınız...">
        </div>
        <hr class="mt-3 mb-0">
      </div>

      <div class="flex-grow-1 p-4">
        <ul class="list-group"></ul>
      </div>

      <div class="panel-footer p-4 border-top d-flex justify-content-end">
        <a href="#" id="clearButton" class="btn btn-clear">Tüm Todoları Temizle</a>
      </div>
    </div>
  </div>

</body>
</html>
